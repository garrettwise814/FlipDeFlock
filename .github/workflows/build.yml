name: "FAP: Build"

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: "Build .fap (ufbt)"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with ufbt
        id: build-app
        uses: flipperdevices/flipperzero-ufbt-action@v0.1
        with:
          # Stable official SDK. Switch to "rc" or "dev" if you track those,
          # or to a Momentum SDK index via the action's `sdk-index-url`.
          sdk-channel: release

      - name: Upload .fap artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ steps.build-app.outputs.suffix }}
          path: ${{ steps.build-app.outputs.fap-artifacts }}
          if-no-files-found: error

      # --- API drift guard (advisory only — MUST NOT fail the job) -------------
      # build.yml uses `sdk-channel: release`, which floats: when the official
      # SDK bumps its API version, this app (targeted at API 87.1) keeps building
      # against whatever ships. This step reads the API version ufbt resolved and
      # emits a ::warning:: annotation if it is not 87.1. It never exits non-zero
      # (no `exit 1`; the whole body is `|| true`-guarded and continue-on-error),
      # so a moving SDK warns us without turning the build red.
      - name: API 87.1 drift check (advisory)
        continue-on-error: true
        run: |
          set +e
          EXPECTED="87.1"

          # ufbt stores the resolved SDK state under its toolchain/SDK home.
          # UFBT_HOME is exported by the ufbt-action; fall back to the default.
          UFBT_STATE_DIR="${UFBT_HOME:-$HOME/.ufbt}"

          # The SDK's api_symbols.csv header / sdk.opts / .ufbt state records the
          # API version. We try a few known locations and parse the first hit.
          # Pattern: lines like `Version,87.1` in api_symbols.csv, or an
          # `"api"` field in the ufbt state json.
          API_VER=""

          # 1) api_symbols.csv: header row "api_symbol,..." with a Version,<x.y> row
          CSV=$(find "$UFBT_STATE_DIR" -name 'api_symbols.csv' 2>/dev/null | head -n1)
          if [ -n "$CSV" ]; then
            API_VER=$(grep -m1 -iE '^Version,' "$CSV" 2>/dev/null | cut -d',' -f2 | tr -d ' \r')
          fi

          # 2) ufbt state json (e.g. .ufbt/current/.data or sdk_state) -> "api" field
          if [ -z "$API_VER" ]; then
            JSON=$(find "$UFBT_STATE_DIR" -name '*.json' 2>/dev/null | head -n5)
            for f in $JSON; do
              V=$(grep -oiE '"api"[[:space:]]*:[[:space:]]*"?[0-9]+\.[0-9]+' "$f" 2>/dev/null \
                    | head -n1 | grep -oE '[0-9]+\.[0-9]+' | head -n1)
              if [ -n "$V" ]; then API_VER="$V"; break; fi
            done
          fi

          if [ -z "$API_VER" ]; then
            # Could not reliably determine the API version. Do NOT guess and do
            # NOT fail — just note it so a human can investigate if needed.
            echo "::warning title=API drift check::Could not determine the SDK API version ufbt built against (searched '$UFBT_STATE_DIR'). Skipping drift comparison. Expected API $EXPECTED."
            exit 0
          fi

          echo "Detected SDK API version: $API_VER (expected $EXPECTED)"
          if [ "$API_VER" != "$EXPECTED" ]; then
            echo "::warning title=API drift::ufbt built against API $API_VER but this app targets API $EXPECTED. The 'release' SDK channel has drifted; review for compatibility. (Advisory only — build not failed.)"
          else
            echo "API version matches expected $EXPECTED."
          fi
          exit 0

      - name: Lint sources (advisory)
        uses: flipperdevices/flipperzero-ufbt-action@v0.1
        continue-on-error: true
        with:
          skip-setup: true
          task: lint
